<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SecureAuth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-slate-900 to-indigo-950 min-h-screen text-white p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-10 glass p-6 rounded-3xl">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-indigo-600 rounded-full flex items-center justify-center font-bold text-xl" id="userInitial">U</div>
                <div>
                    <h1 class="text-xl font-black" id="welcomeName">Welcome, User</h1>
                    <p class="text-xs text-slate-400" id="userEmail">user@example.com</p>
                </div>
            </div>
            <button onclick="Dashboard.logout()" class="bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white px-5 py-2 rounded-xl transition-all font-bold text-sm">
                <i class="fas fa-sign-out-alt mr-2"></i> Logout
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-8">
                <section class="glass p-8 rounded-[2rem]">
                    <h3 class="text-lg font-bold mb-6 flex items-center gap-2">
                        <i class="fas fa-user-shield text-indigo-400"></i> Profile Status
                    </h3>
                    <div class="space-y-4">
                        <div class="flex justify-between text-sm">
                            <span class="text-slate-400">Account ID:</span>
                            <span class="font-mono text-indigo-300" id="displayID">---</span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="text-slate-400">Created:</span>
                            <span id="displayDate">---</span>
                        </div>
                        <div class="pt-4 border-t border-slate-700/50">
                            <button class="w-full bg-slate-800 hover:bg-slate-700 py-3 rounded-xl text-sm font-bold transition-all">Update Profile</button>
                        </div>
                    </div>
                </section>

                <section class="glass p-8 rounded-[2rem] border-red-500/20">
                    <h3 class="text-lg font-bold mb-4 text-red-400">Danger Zone</h3>
                    <p class="text-xs text-slate-400 mb-4">Deleting your account is permanent and cannot be undone.</p>
                    <button onclick="Dashboard.deleteAccount()" class="w-full border border-red-500/50 text-red-500 hover:bg-red-500 hover:text-white py-3 rounded-xl text-sm font-bold transition-all">Delete Account</button>
                </section>
            </div>

            <div class="lg:col-span-2">
                <section class="glass p-8 rounded-[2rem] h-full">
                    <h3 class="text-lg font-bold mb-6 flex items-center gap-2">
                        <i class="fas fa-history text-indigo-400"></i> Recent Activity Logs
                    </h3>
                    <div class="space-y-4" id="logContainer">
                        </div>
                </section>
            </div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script>
        const Dashboard = {
            init() {
                const session = Storage.get('session');
                const users = Storage.get('users') || [];
                
                
                if (!session || session.expiry < Date.now()) {
                    window.location.href = 'index.html';
                    return;
                }

                const user = users.find(u => u.id === session.userId);
                if (!user) { window.location.href = 'index.html'; return; }

                this.renderUser(user);
                this.addLog("Login successful", "success");
            },

            renderUser(user) {
                document.getElementById('welcomeName').innerText = `Welcome, ${user.name}`;
                document.getElementById('userEmail').innerText = user.email;
                document.getElementById('userInitial').innerText = user.name[0].toUpperCase();
                document.getElementById('displayID').innerText = user.id;
                document.getElementById('displayDate').innerText = new Date(user.createdAt).toLocaleDateString();
            },

            addLog(action, type) {
                const container = document.getElementById('logContainer');
                const time = new Date().toLocaleTimeString();
                const log = document.createElement('div');
                log.className = `flex justify-between items-center p-4 rounded-2xl bg-slate-800/30 border-l-4 ${type === 'success' ? 'border-green-500' : 'border-indigo-500'}`;
                log.innerHTML = `
                    <div>
                        <p class="text-sm font-bold">${action}</p>
                        <p class="text-[10px] text-slate-500 uppercase">${time}</p>
                    </div>
                    <i class="fas fa-check-circle text-slate-600"></i>
                `;
                container.prepend(log);
            },

            logout() {
                Storage.remove('session');
                window.location.href = 'index.html';
            },

            deleteAccount() {
                if(confirm("Are you absolutely sure? This will erase all data.")) {
                    const session = Storage.get('session');
                    let users = Storage.get('users') || [];
                    users = users.filter(u => u.id !== session.userId);
                    Storage.set('users', users);
                    this.logout();
                }
            }
        };

        Dashboard.init();
    </script>
</body>
</html>
