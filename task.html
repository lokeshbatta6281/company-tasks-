<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Task Manager 2026</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1; --primary-hover: #4f46e5;
            --bg: #f3f4f6; --card: #ffffff;
            --text-main: #1f2937; --text-muted: #6b7280;
            --danger: #ef4444; --success: #10b981; --warning: #f59e0b;
        }

        body {
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        #root { width: 100%; max-width: 700px; }

        .app-card {
            background: var(--card);
            padding: 32px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        header { margin-bottom: 24px; }
        h1 { font-size: 2rem; font-weight: 800; margin: 0 0 16px 0; color: var(--primary); }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 0.95rem;
        }

        .task-form {
            display: grid;
            grid-template-columns: 1fr auto auto auto;
            gap: 12px;
            margin-bottom: 30px;
            background: #f9fafb;
            padding: 16px;
            border-radius: 14px;
        }

        input, select, button {
            padding: 10px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            outline: none;
            font-family: inherit;
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-add:hover { background: var(--primary-hover); }

        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid #f3f4f6;
            padding-bottom: 12px;
        }

        .filter-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 600;
            padding: 6px 12px;
        }

        .filter-btn.active {
            color: var(--primary);
            background: #e0e7ff;
            border-radius: 6px;
        }

        .task-list { list-style: none; padding: 0; margin: 0; }
        
        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px;
            border-bottom: 1px solid #f3f4f6;
            transition: transform 0.1s;
        }

        .task-item:hover { background: #fafafa; }

        .task-content { display: flex; align-items: center; gap: 12px; flex: 1; }

        .checkbox { width: 18px; height: 18px; cursor: pointer; }

        .task-text { font-weight: 500; transition: 0.2s; }
        .completed .task-text { text-decoration: line-through; color: var(--text-muted); }

        .badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .p-High { background: #fee2e2; color: var(--danger); }
        .p-Medium { background: #fef3c7; color: var(--warning); }
        .p-Low { background: #dcfce7; color: var(--success); }

        .delete-btn {
            background: none;
            border: none;
            color: #d1d5db;
            font-size: 1.2rem;
            cursor: pointer;
            margin-left: 10px;
        }
        .delete-btn:hover { color: var(--danger); }

        .empty-state { text-align: center; color: var(--text-muted); margin-top: 40px; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            // State
            const [tasks, setTasks] = useState(() => {
                const saved = localStorage.getItem("advanced_todo_v1");
                return saved ? JSON.parse(saved) : [];
            });
            const [input, setInput] = useState("");
            const [priority, setPriority] = useState("Medium");
            const [category, setCategory] = useState("Work");
            const [filter, setFilter] = useState("All");
            const [searchTerm, setSearchTerm] = useState("");

            // Auto-save to LocalStorage
            useEffect(() => {
                localStorage.setItem("advanced_todo_v1", JSON.stringify(tasks));
            }, [tasks]);

            const addTask = (e) => {
                e.preventDefault();
                if (!input.trim()) return;
                
                const newTask = {
                    id: Date.now(),
                    text: input,
                    priority,
                    category,
                    completed: false
                };
                
                setTasks([newTask, ...tasks]);
                setInput("");
            };

            const toggleTask = (id) => {
                setTasks(tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t));
            };

            const deleteTask = (id) => {
                setTasks(tasks.filter(t => t.id !== id));
            };

            // Advanced Filtering & Search
            const processedTasks = tasks
                .filter(t => {
                    if (filter === "Active") return !t.completed;
                    if (filter === "Completed") return t.completed;
                    return true;
                })
                .filter(t => t.text.toLowerCase().includes(searchTerm.toLowerCase()));

            return (
                <div className="app-card">
                    <header>
                        <h1>FocusFlow</h1>
                        <input 
                            className="search-input"
                            type="text" 
                            placeholder="🔍 Search tasks..." 
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                        />
                    </header>

                    <form className="task-form" onSubmit={addTask}>
                        <input 
                            type="text" 
                            placeholder="Add a new task..." 
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                        />
                        <select value={priority} onChange={(e) => setPriority(e.target.value)}>
                            <option>High</option>
                            <option>Medium</option>
                            <option>Low</option>
                        </select>
                        <select value={category} onChange={(e) => setCategory(e.target.value)}>
                            <option>Work</option>
                            <option>Personal</option>
                            <option>Idea</option>
                        </select>
                        <button className="btn-add" type="submit">Add</button>
                    </form>

                    <div className="filters">
                        {['All', 'Active', 'Completed'].map(f => (
                            <button 
                                key={f}
                                className={`filter-btn ${filter === f ? 'active' : ''}`}
                                onClick={() => setFilter(f)}
                            >
                                {f}
                            </button>
                        ))}
                    </div>

                    <ul className="task-list">
                        {processedTasks.length > 0 ? processedTasks.map(task => (
                            <li key={task.id} className={`task-item ${task.completed ? 'completed' : ''}`}>
                                <div className="task-content">
                                    <input 
                                        type="checkbox" 
                                        className="checkbox"
                                        checked={task.completed}
                                        onChange={() => toggleTask(task.id)}
                                    />
                                    <span className="task-text">{task.text}</span>
                                    <span className={`badge p-${task.priority}`}>{task.priority}</span>
                                    <span className="badge" style={{background:'#f3f4f6'}}>{task.category}</span>
                                </div>
                                <button className="delete-btn" onClick={() => deleteTask(task.id)}>×</button>
                            </li>
                        )) : (
                            <div className="empty-state">No tasks found. Time to relax? ☕</div>
                        )}
                    </ul>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
