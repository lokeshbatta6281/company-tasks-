<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Image Slider</title>
    <style>
        :root {
            --primary: #4a6297;
            --white: #ffffff;
            --transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: #7b95bd;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .slider-container {
            position: relative;
            width: 90%;
            max-width: 800px;
            height: 450px;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .slider-track {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform var(--transition);
        }

        .slide {
            min-width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--white);
            text-align: center;
            background-size: cover;
            background-position: center;
        }

        .slide::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
        }

        .content {
            position: relative;
            z-index: 1;
            padding: 20px;
        }

        .content h2 { font-size: 3rem; margin-bottom: 10px; }

        .btn {
            padding: 12px 25px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn:hover { background: #1d4ed8; transform: scale(1.05); }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border: none;
            color: white;
            padding: 15px 20px;
            cursor: pointer;
            border-radius: 50%;
            z-index: 2;
            transition: 0.3s;
        }

        .nav-btn:hover { background: rgba(255, 255, 255, 0.4); }
        .prev { left: 20px; }
        .next { right: 20px; }

        .dots-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 2;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            cursor: pointer;
        }

        .dot.active { background: var(--white); width: 25px; border-radius: 10px; }
    </style>
</head>
<body>

    <section class="slider-container">
        <div class="slider-track" id="track">
            <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=80')">
                <div class="content">
                    <h2>Mountain Peaks</h2>
                    <p>Experience the heights of the Alps.</p>
                    <button class="btn" onclick="alert('Booking Peaks...')">Explore Now</button>
                </div>
            </div>
            <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=800&q=80')">
                <div class="content">
                    <h2>Ocean Breeze</h2>
                    <p>Serenity in the tropical sun.</p>
                    <button class="btn" onclick="alert('Booking Beach...')">View Dates</button>
                </div>
            </div>
            <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=800&q=80')">
                <div class="content">
                    <h2>Forest Trails</h2>
                    <p>Connect with nature's heart.</p>
                    <button class="btn" onclick="alert('Booking Forest...')">Get Guide</button>
                </div>
            </div>
            <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1449034446853-66c86144b0ad?auto=format&fit=crop&w=800&q=80')">
                <div class="content">
                    <h2>Golden Gate</h2>
                    <p>Iconic cityscapes await.</p>
                    <button class="btn" onclick="alert('Booking City...')">See Map</button>
                </div>
            </div>
            <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=800&q=80')">
                <div class="content">
                    <h2>Starlit Night</h2>
                    <p>Under the cosmic canopy.</p>
                    <button class="btn" onclick="alert('Booking Stargazing...')">Join Tour</button>
                </div>
            </div>
        </div>

        <button class="nav-btn prev" onclick="moveSlide(-1)">&#10094;</button>
        <button class="nav-btn next" onclick="moveSlide(1)">&#10095;</button>

        <div class="dots-container" id="dots"></div>
    </section>

    <script>
        const track = document.getElementById('track');
        const slides = document.querySelectorAll('.slide');
        const dotsContainer = document.getElementById('dots');
        
        let currentIndex = 0;
        const totalSlides = slides.length;

        slides.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            if (i === 0) dot.classList.add('active');
            dot.addEventListener('click', () => goToSlide(i));
            dotsContainer.appendChild(dot);
        });

        const dots = document.querySelectorAll('.dot');

        function updateSlider() {
            
            track.style.transform = `translateX(-${currentIndex * 100}%)`;
            
            
            dots.forEach(dot => dot.classList.remove('active'));
            dots[currentIndex].classList.add('active');
        }

        function moveSlide(direction) {
            currentIndex += direction;
            
            if (currentIndex >= totalSlides) {
                currentIndex = 0; 
            } else if (currentIndex < 0) {
                currentIndex = totalSlides - 1;
            }
            
            updateSlider();
        }

        function goToSlide(index) {
            currentIndex = index;
            updateSlider();
        }

        setInterval(() => moveSlide(1), 5000);
    </script>
</body>
</html>
